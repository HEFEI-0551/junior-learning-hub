<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>初中单词百词斩闯关</title>
  <style>
    :root {
      --ink: #15212f;
      --muted: #667085;
      --line: #d9e0e8;
      --paper: #f7f9fc;
      --panel: #ffffff;
      --blue: #2563eb;
      --green: #0f9f6e;
      --orange: #f59e0b;
      --red: #e23d3d;
      --teal: #0891b2;
      --shadow: 0 14px 40px rgba(20, 32, 48, .12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 12%, rgba(37, 99, 235, .12), transparent 28%),
        radial-gradient(circle at 86% 22%, rgba(15, 159, 110, .12), transparent 26%),
        linear-gradient(135deg, #eef6ff 0%, #f8fbf7 52%, #fff7ed 100%);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--ink);
      color: white;
      box-shadow: var(--shadow);
      flex: 0 0 auto;
    }

    .logo svg {
      width: 28px;
      height: 28px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 24px;
      line-height: 1.2;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .8);
      color: var(--ink);
      display: grid;
      place-items: center;
      transition: .16s ease;
    }

    .icon-btn:hover,
    .choice:hover,
    .primary:hover,
    .secondary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(20, 32, 48, .14);
    }

    .icon-btn svg,
    .small-icon {
      width: 20px;
      height: 20px;
    }

    main {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 18px;
      min-height: 0;
    }

    .sidebar,
    .stage,
    .result-panel {
      border: 1px solid rgba(217, 224, 232, .85);
      border-radius: 8px;
      background: rgba(255, 255, 255, .82);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .sidebar {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-self: start;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      min-height: 72px;
    }

    .stat b {
      display: block;
      font-size: 22px;
      line-height: 1.15;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .level-list {
      display: grid;
      gap: 8px;
    }

    .level-btn {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
      color: var(--ink);
    }

    .level-btn.active {
      border-color: var(--blue);
      color: var(--blue);
      box-shadow: inset 3px 0 0 var(--blue);
    }

    .level-btn:disabled {
      color: #98a2b3;
      background: #f2f4f7;
      cursor: not-allowed;
    }

    .badge {
      min-width: 34px;
      text-align: center;
      border-radius: 999px;
      padding: 3px 8px;
      color: #fff;
      background: var(--green);
      font-size: 12px;
    }

    .badge.lock {
      background: #98a2b3;
    }

    .stage {
      min-height: 620px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .hero {
      position: relative;
      min-height: 210px;
      padding: 24px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      align-items: center;
      gap: 18px;
      overflow: hidden;
      background:
        linear-gradient(120deg, rgba(21, 33, 47, .94), rgba(8, 145, 178, .86)),
        #15212f;
      color: #fff;
    }

    .hero h2 {
      font-size: 36px;
      line-height: 1.12;
      max-width: 620px;
    }

    .hero p {
      margin-top: 12px;
      color: rgba(255, 255, 255, .78);
      line-height: 1.7;
      max-width: 620px;
    }

    .scene {
      width: 100%;
      max-width: 280px;
      justify-self: end;
    }

    .scene svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .game {
      padding: 20px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 18px;
    }

    .meter-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
    }

    .progress {
      height: 12px;
      border-radius: 999px;
      background: #e7edf4;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), var(--blue));
      transition: width .25s ease;
    }

    .counter {
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    .word-zone {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
    }

    .word {
      font-size: 54px;
      line-height: 1;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .phonetic {
      margin-top: 8px;
      color: var(--muted);
      font-size: 16px;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-content: start;
    }

    .choice {
      min-height: 82px;
      padding: 16px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fff;
      text-align: left;
      color: var(--ink);
      transition: .16s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      line-height: 1.4;
    }

    .choice .letter {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #eef2f7;
      color: var(--muted);
      font-weight: 800;
      flex: 0 0 auto;
    }

    .choice.correct {
      border-color: var(--green);
      background: #eaf8f2;
    }

    .choice.wrong {
      border-color: var(--red);
      background: #fff0f0;
    }

    .choice:disabled {
      cursor: default;
    }

    .feedback {
      min-height: 86px;
      border-left: 4px solid var(--teal);
      padding: 12px 14px;
      background: #f0fbfe;
      border-radius: 8px;
      line-height: 1.55;
    }

    .feedback strong {
      color: var(--teal);
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .primary,
    .secondary {
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid transparent;
      padding: 10px 16px;
      font-weight: 800;
      transition: .16s ease;
    }

    .primary {
      color: #fff;
      background: var(--blue);
    }

    .primary:disabled {
      background: #98a2b3;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .secondary {
      color: var(--ink);
      background: #fff;
      border-color: var(--line);
    }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      background: #fff;
    }

    .result-panel {
      padding: 22px;
      display: none;
      gap: 18px;
      align-content: start;
    }

    .result-panel.show {
      display: grid;
    }

    .result-panel h2 {
      font-size: 30px;
    }

    .review-list {
      display: grid;
      gap: 8px;
    }

    .review-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 130px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    .review-item b {
      font-size: 18px;
    }

    footer {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding-bottom: 4px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 860px) {
      .app {
        width: min(100% - 20px, 680px);
        padding: 12px 0;
      }

      .topbar,
      main,
      .hero,
      .word-zone {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: start;
      }

      main {
        display: flex;
        flex-direction: column;
      }

      .sidebar {
        order: 2;
      }

      .stage {
        min-height: 0;
      }

      .hero {
        min-height: 260px;
      }

      .hero h2 {
        font-size: 30px;
      }

      .scene {
        max-width: 210px;
        justify-self: center;
      }

      .choices {
        grid-template-columns: 1fr;
      }

      .word {
        font-size: 42px;
      }

      .review-item {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M5 19L19 5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            <path d="M14 4h6v6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 20l5-1-4-4-1 5z" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <h1>初中单词百词斩闯关</h1>
          <p class="subtitle">100 个准初一核心词，10 关通关，错题自动复练</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="parentBtn" title="家长检查" aria-label="家长检查">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 19V5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M4 19h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M8 15v-4M12 15V8M16 15v-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="icon-btn" id="soundToggle" title="朗读开关" aria-label="朗读开关">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 9v6h4l5 4V5L8 9H4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M16 8.5c1.4 1.7 1.4 5.3 0 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="icon-btn" id="resetBtn" title="重置进度" aria-label="重置进度">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 7v5h5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5.8 17A7.5 7.5 0 1 0 5 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <main>
      <aside class="sidebar">
        <section class="stat-grid" aria-label="学习数据">
          <div class="stat"><b id="totalMastered">0</b><span>已掌握</span></div>
          <div class="stat"><b id="bestStreak">0</b><span>最高连胜</span></div>
          <div class="stat"><b id="mistakeCount">0</b><span>错题数</span></div>
          <div class="stat"><b id="stars">0</b><span>星星</span></div>
        </section>
        <section>
          <h3>关卡</h3>
          <div class="level-list" id="levelList"></div>
        </section>
      </aside>

      <section class="stage" id="stage">
        <div class="hero">
          <div>
            <h2>每天闯一关，开学前先把 100 个高频词认熟。</h2>
            <p>看英文选中文，答对推进，答错会收进错题本。每关结束后先复盘，再解锁下一关。</p>
          </div>
          <div class="scene" aria-hidden="true">
            <svg viewBox="0 0 320 220" role="img">
              <defs>
                <linearGradient id="blade" x1="0" x2="1">
                  <stop offset="0" stop-color="#f8fafc"/>
                  <stop offset="1" stop-color="#93c5fd"/>
                </linearGradient>
                <linearGradient id="flag" x1="0" x2="1">
                  <stop offset="0" stop-color="#f59e0b"/>
                  <stop offset="1" stop-color="#ef4444"/>
                </linearGradient>
              </defs>
              <path d="M36 188h250" stroke="rgba(255,255,255,.35)" stroke-width="10" stroke-linecap="round"/>
              <path d="M90 166l128-128 18 18L108 184z" fill="url(#blade)"/>
              <path d="M86 160l34 34" stroke="#fbbf24" stroke-width="12" stroke-linecap="round"/>
              <path d="M70 185l30-30" stroke="#111827" stroke-width="12" stroke-linecap="round"/>
              <path d="M208 48h62l-18 22 18 22h-62z" fill="url(#flag)"/>
              <path d="M205 35v94" stroke="#f8fafc" stroke-width="8" stroke-linecap="round"/>
              <circle cx="88" cy="68" r="28" fill="rgba(255,255,255,.16)"/>
              <text x="76" y="77" fill="#fff" font-family="Arial, sans-serif" font-size="26" font-weight="800">A</text>
              <circle cx="238" cy="146" r="18" fill="rgba(255,255,255,.16)"/>
              <text x="228" y="153" fill="#fff" font-family="Arial, sans-serif" font-size="18" font-weight="800">B</text>
            </svg>
          </div>
        </div>

        <div class="game" id="game">
          <div class="meter-row">
            <div class="progress" aria-label="本关进度"><span id="progressBar"></span></div>
            <div class="counter" id="counter">1 / 10</div>
          </div>

          <div class="word-zone">
            <div>
              <div class="word" id="wordText">school</div>
              <div class="phonetic" id="phonetic">/skuːl/</div>
            </div>
            <button class="icon-btn" id="speakBtn" title="朗读单词" aria-label="朗读单词">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M5 9v6h4l5 4V5L9 9H5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                <path d="M17 9c.9 1.4.9 4.6 0 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>

          <div class="choices" id="choices"></div>

          <div class="feedback" id="feedback">
            <strong>准备开始：</strong>选择你认为正确的中文意思。
          </div>

          <div class="controls">
            <div class="pill-row">
              <span class="pill" id="levelName">第 1 关：校园生活</span>
              <span class="pill" id="streak">连胜 0</span>
              <span class="pill" id="score">本关 0 分</span>
            </div>
            <button class="primary" id="nextBtn" disabled>下一词</button>
          </div>
        </div>

        <div class="result-panel" id="resultPanel">
          <h2 id="resultTitle">闯关完成</h2>
          <p id="resultText"></p>
          <div class="review-list" id="reviewList"></div>
          <div class="controls">
            <button class="secondary" id="retryBtn">重练本关</button>
            <button class="primary" id="continueBtn">进入下一关</button>
          </div>
        </div>
      </section>
    </main>

    <footer>建议每天 15 分钟：先闯关，再朗读错题 3 遍。</footer>
  </div>

  <script>
    const levels = [
      {
        name: "校园生活",
        words: [
          ["school", "/skuːl/", "学校", "Our school is near the park."],
          ["classroom", "/ˈklɑːsruːm/", "教室", "The classroom is bright and clean."],
          ["teacher", "/ˈtiːtʃə(r)/", "老师", "Our English teacher is kind."],
          ["student", "/ˈstjuːdnt/", "学生", "Every student has a new book."],
          ["lesson", "/ˈlesn/", "课程；课", "The first lesson starts at eight."],
          ["homework", "/ˈhəʊmwɜːk/", "家庭作业", "I finish my homework after dinner."],
          ["subject", "/ˈsʌbdʒɪkt/", "学科", "Math is my favorite subject."],
          ["library", "/ˈlaɪbrəri/", "图书馆", "We read books in the library."],
          ["exam", "/ɪɡˈzæm/", "考试", "The exam is next Monday."],
          ["question", "/ˈkwestʃən/", "问题", "Can I ask a question?"]
        ]
      },
      {
        name: "家庭朋友",
        words: [
          ["family", "/ˈfæməli/", "家庭", "My family has four people."],
          ["parent", "/ˈpeərənt/", "父亲或母亲", "A parent can help with planning."],
          ["cousin", "/ˈkʌzn/", "堂兄弟姐妹；表兄弟姐妹", "My cousin lives in Hefei."],
          ["friend", "/frend/", "朋友", "A good friend listens carefully."],
          ["neighbor", "/ˈneɪbə(r)/", "邻居", "Our neighbor is very helpful."],
          ["birthday", "/ˈbɜːθdeɪ/", "生日", "Her birthday is in July."],
          ["photo", "/ˈfəʊtəʊ/", "照片", "This photo is from last year."],
          ["address", "/əˈdres/", "地址", "Please write your address here."],
          ["visit", "/ˈvɪzɪt/", "拜访；参观", "We visit grandparents on Sunday."],
          ["together", "/təˈɡeðə(r)/", "一起", "We study together after school."]
        ]
      },
      {
        name: "日常行动",
        words: [

      {

      },
      {
        name: "食物健康",
        words: [
          ["breakfast", "/ˈbrekfəst/", "早餐", "Breakfast gives us energy."],

          ["strong", "/strɒŋ/", "强壮的", "Exercise makes us strong."],
          ["tired", "/ˈtaɪəd/", "疲劳的", "I feel tired after a long day."],
          ["hungry", "/ˈhʌŋɡri/", "饥饿的", "I am hungry before lunch."],
          ["delicious", "/dɪˈlɪʃəs/", "美味的", "The noodles are delicious."],
          ["medicine", "/ˈmedsn/", "药", "Take the medicine on time."]
        ]
      },
      {
        name: "地点方向",
        words: [
          ["city", "/ˈsɪti/", "城市", "Hefei is a beautiful city."],
          ["street", "/striːt/", "街道", "The shop is across the street."],
          ["station", "/ˈsteɪʃn/", "车站", "Meet me at the station."],
          ["hospital", "/ˈhɒspɪtl/", "医院", "The hospital is next to the bank."],
          ["museum", "/mjuˈziːəm/", "博物馆", "We visited a museum last week."],
          ["between", "/bɪˈtwiːn/", "在……之间", "The desk is between two chairs."],
          ["behind", "/bɪˈhaɪnd/", "在……后面", "The bag is behind the door."],
          ["across", "/əˈkrɒs/", "横过；在对面", "Walk across the road carefully."],
          ["near", "/nɪə(r)/", "在附近", "The library is near our school."],
          ["outside", "/ˌaʊtˈsaɪd/", "在外面", "Wait outside the classroom."]
        ]
      },
      {
        name: "兴趣活动",
        words: [
          ["music", "/ˈmjuːzɪk/", "音乐", "Music helps me relax."],
          ["movie", "/ˈmuːvi/", "电影", "This movie is interesting."],
          ["sport", "/spɔːt/", "运动", "Sport is good for students."],
          ["basketball", "/ˈbɑːskɪtbɔːl/", "篮球", "He plays basketball well."],
          ["travel", "/ˈtrævl/", "旅行", "We travel during the holiday."],
          ["hobby", "/ˈhɒbi/", "爱好", "Reading is a quiet hobby."],
          ["collect", "/kəˈlekt/", "收集", "Some students collect stamps."],
          ["draw", "/drɔː/", "画", "She likes to draw after class."],
          ["dance", "/dɑːns/", "跳舞", "They dance at the school show."],
          ["club", "/klʌb/", "俱乐部；社团", "Join a club you really like."]
        ]
      },
      {
        name: "性格感受",
        words: [
          ["happy", "/ˈhæpi/", "高兴的", "I feel happy when I learn well."],
          ["nervous", "/ˈnɜːvəs/", "紧张的", "It is normal to feel nervous."],
          ["careful", "/ˈkeəfl/", "仔细的", "Be careful with signs in math."],
          ["brave", "/breɪv/", "勇敢的", "Be brave and try again."],
          ["quiet", "/ˈkwaɪət/", "安静的", "The room is quiet now."],
          ["friendly", "/ˈfrendli/", "友好的", "Our classmates are friendly."],
          ["different", "/ˈdɪfrənt/", "不同的", "Middle school feels different."],
          ["important", "/ɪmˈpɔːtnt/", "重要的", "Good habits are important."],
          ["interesting", "/ˈɪntrəstɪŋ/", "有趣的", "The story is interesting."],
          ["difficult", "/ˈdɪfɪkəlt/", "困难的", "This word is difficult but useful."]
        ]
      },
      {
        name: "自然世界",
        words: [
          ["weather", "/ˈweðə(r)/", "天气", "The weather changes quickly."],
          ["season", "/ˈsiːzn/", "季节", "Spring is my favorite season."],
          ["summer", "/ˈsʌmə(r)/", "夏天", "Summer is hot in Hefei."],
          ["winter", "/ˈwɪntə(r)/", "冬天", "Winter can be cold."],
          ["river", "/ˈrɪvə(r)/", "河流", "A river runs through the town."],
          ["mountain", "/ˈmaʊntən/", "山", "The mountain looks high."],
          ["forest", "/ˈfɒrɪst/", "森林", "The forest is quiet and green."],
          ["earth", "/ɜːθ/", "地球；土地", "The earth is our home."],
          ["nature", "/ˈneɪtʃə(r)/", "自然", "Nature gives us many lessons."],
          ["protect", "/prəˈtekt/", "保护", "We should protect the environment."]
        ]
      },
      {
        name: "学习进阶",
        words: [
          ["plan", "/plæn/", "计划", "Make a plan before you study."],
          ["goal", "/ɡəʊl/", "目标", "Set a small goal every day."],
          ["habit", "/ˈhæbɪt/", "习惯", "A good habit saves time."],
          ["mistake", "/mɪˈsteɪk/", "错误", "A mistake can teach you a lot."],
          ["improve", "/ɪmˈpruːv/", "提高；改善", "You can improve by reviewing."],
          ["prepare", "/prɪˈpeə(r)/", "准备", "Prepare your books tonight."],
          ["review", "/rɪˈvjuː/", "复习", "Review the words before sleep."],
          ["example", "/ɪɡˈzɑːmpl/", "例子", "Give an example in your answer."],
          ["sentence", "/ˈsentəns/", "句子", "Make a sentence with this word."],
          ["success", "/səkˈses/", "成功", "Success comes from small steps."]
        ]
      }
    ];

    const allMeanings = levels.flatMap(level => level.words.map(word => word[2]));
    const storageKey = "junior-word-blade-progress-v1";
    const state = loadState();
    const game = {
      levelIndex: state.currentLevel || 0,
      wordIndex: 0,
      score: 0,
      streak: 0,
      selected: false,
      roundMistakes: []
    };

    const els = {
      levelList: document.querySelector("#levelList"),
      totalMastered: document.querySelector("#totalMastered"),
      bestStreak: document.querySelector("#bestStreak"),
      mistakeCount: document.querySelector("#mistakeCount"),
      stars: document.querySelector("#stars"),
      progressBar: document.querySelector("#progressBar"),
      counter: document.querySelector("#counter"),
      wordText: document.querySelector("#wordText"),
      phonetic: document.querySelector("#phonetic"),
      choices: document.querySelector("#choices"),
      feedback: document.querySelector("#feedback"),
      nextBtn: document.querySelector("#nextBtn"),
      levelName: document.querySelector("#levelName"),
      streak: document.querySelector("#streak"),
      score: document.querySelector("#score"),
      resultPanel: document.querySelector("#resultPanel"),
      game: document.querySelector("#game"),
      resultTitle: document.querySelector("#resultTitle"),
      resultText: document.querySelector("#resultText"),
      reviewList: document.querySelector("#reviewList"),
      continueBtn: document.querySelector("#continueBtn"),
      retryBtn: document.querySelector("#retryBtn"),
      resetBtn: document.querySelector("#resetBtn"),
      parentBtn: document.querySelector("#parentBtn"),
      speakBtn: document.querySelector("#speakBtn"),
      soundToggle: document.querySelector("#soundToggle")
    };

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || {
          unlocked: 1,
          completed: {},
          mistakes: {},
          history: [],
          bestStreak: 0,
          sound: true,
          currentLevel: 0
        };
      } catch {
        return { unlocked: 1, completed: {}, mistakes: {}, bestStreak: 0, sound: true, currentLevel: 0 };
      }
    }

    function todayKey() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function recordStudy(correct, stars) {
      state.history ||= [];
      state.history.push({
        date: todayKey(),
        time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" }),
        subject: "英语",
        level: game.levelIndex + 1,
        levelName: levels[game.levelIndex].name,
        correct,
        total: levels[game.levelIndex].words.length,
        stars,
        mistakes: game.roundMistakes.map(item => `${item.word}=${item.correct}`).slice(0, 6)
      });
      state.history = state.history.slice(-80);
    }

    function saveState() {
      state.currentLevel = game.levelIndex;
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function shuffle(items) {
      return [...items].sort(() => Math.random() - .5);
    }

    function makeChoices(correct) {
      const wrong = shuffle(allMeanings.filter(item => item !== correct)).slice(0, 3);
      return shuffle([correct, ...wrong]);
    }

    function renderLevels() {
      els.levelList.innerHTML = "";
      levels.forEach((level, index) => {
        const button = document.createElement("button");
        button.className = "level-btn" + (index === game.levelIndex ? " active" : "");
        button.disabled = index >= state.unlocked;
        const stars = state.completed[index]?.stars || 0;
        button.innerHTML = `<span>第 ${index + 1} 关 ${level.name}</span><span class="badge ${button.disabled ? "lock" : ""}">${button.disabled ? "锁" : "★".repeat(stars) || "开"}</span>`;
        button.addEventListener("click", () => startLevel(index));
        els.levelList.appendChild(button);
      });
    }

    function renderStats() {
      const completedWords = Object.values(state.completed).reduce((sum, item) => sum + item.correct, 0);
      const totalStars = Object.values(state.completed).reduce((sum, item) => sum + item.stars, 0);
      els.totalMastered.textContent = completedWords;
      els.bestStreak.textContent = state.bestStreak || 0;
      els.mistakeCount.textContent = Object.keys(state.mistakes || {}).length;
      els.stars.textContent = totalStars;
    }

    function startLevel(index) {
      game.levelIndex = index;
      game.wordIndex = 0;
      game.score = 0;
      game.streak = 0;
      game.selected = false;
      game.roundMistakes = [];
      els.resultPanel.classList.remove("show");
      els.game.classList.remove("hidden");
      renderLevels();
      renderStats();
      renderWord();
      saveState();
    }

    function renderWord() {
      const level = levels[game.levelIndex];
      const item = level.words[game.wordIndex];
      const [word, phonetic] = item;
      game.selected = false;
      els.wordText.textContent = word;
      els.phonetic.textContent = phonetic;
      els.levelName.textContent = `第 ${game.levelIndex + 1} 关：${level.name}`;
      els.counter.textContent = `${game.wordIndex + 1} / ${level.words.length}`;
      els.progressBar.style.width = `${(game.wordIndex / level.words.length) * 100}%`;
      els.streak.textContent = `连胜 ${game.streak}`;
      els.score.textContent = `本关 ${game.score} 分`;
      els.feedback.innerHTML = "<strong>出招：</strong>选出这个英文单词的中文意思。";
      els.nextBtn.disabled = true;
      renderChoices(item);
      if (state.sound) speak(word);
    }

    function renderChoices(item) {
      const correct = item[2];
      const choices = makeChoices(correct);
      els.choices.innerHTML = "";
      choices.forEach((choice, index) => {
        const button = document.createElement("button");
        button.className = "choice";
        button.innerHTML = `<span class="letter">${String.fromCharCode(65 + index)}</span><span>${choice}</span>`;
        button.addEventListener("click", () => choose(button, choice, item));
        els.choices.appendChild(button);
      });
    }

    function choose(button, choice, item) {
      if (game.selected) return;
      game.selected = true;
      const [word, , correct, sentence] = item;
      const isRight = choice === correct;
      [...els.choices.children].forEach(child => {
        child.disabled = true;
        if (child.textContent.includes(correct)) child.classList.add("correct");
      });

      if (isRight) {
        game.score += 10;
        game.streak += 1;
        state.bestStreak = Math.max(state.bestStreak || 0, game.streak);
        delete state.mistakes[word];
        button.classList.add("correct");
        els.feedback.innerHTML = `<strong>斩中：</strong>${word} = ${correct}<br>${sentence}`;
      } else {
        game.streak = 0;
        state.mistakes[word] = { word, correct, sentence, level: levels[game.levelIndex].name };
        game.roundMistakes.push({ word, correct, sentence });
        button.classList.add("wrong");
        els.feedback.innerHTML = `<strong>记一下：</strong>${word} 的意思是“${correct}”。<br>${sentence}`;
      }

      els.streak.textContent = `连胜 ${game.streak}`;
      els.score.textContent = `本关 ${game.score} 分`;
      els.nextBtn.disabled = false;
      renderStats();
      saveState();
    }

    function nextWord() {
      const level = levels[game.levelIndex];
      if (game.wordIndex < level.words.length - 1) {
        game.wordIndex += 1;
        renderWord();
        return;
      }
      finishLevel();
    }

    function finishLevel() {
      const total = levels[game.levelIndex].words.length;
      const correct = Math.round(game.score / 10);
      const stars = correct >= 9 ? 3 : correct >= 7 ? 2 : correct >= 5 ? 1 : 0;
      state.completed[game.levelIndex] = { correct, stars };
      recordStudy(correct, stars);
      if (correct >= 7 && game.levelIndex + 1 < levels.length) {
        state.unlocked = Math.max(state.unlocked, game.levelIndex + 2);
      }
      els.progressBar.style.width = "100%";
      els.game.classList.add("hidden");
      els.resultPanel.classList.add("show");
      els.resultTitle.textContent = stars >= 2 ? "闯关成功" : "本关需要再练";
      els.resultText.textContent = `答对 ${correct}/${total}，获得 ${stars} 颗星。${correct >= 7 ? "下一关已解锁。" : "答对 7 个以上即可解锁下一关。"}`;
      renderReview();
      els.continueBtn.disabled = !(correct >= 7 && game.levelIndex + 1 < levels.length);
      renderLevels();
      renderStats();
      saveState();
    }

    function renderReview() {
      const items = game.roundMistakes.length ? game.roundMistakes : levels[game.levelIndex].words.slice(0, 3).map(item => ({
        word: item[0],
        correct: item[2],
        sentence: item[3]
      }));
      els.reviewList.innerHTML = "";
      items.forEach(item => {
        const row = document.createElement("div");
        row.className = "review-item";
        row.innerHTML = `<b>${item.word}</b><span>${item.correct}<br>${item.sentence}</span>`;
        els.reviewList.appendChild(row);
      });
    }

    function speak(text) {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = .82;
      window.speechSynthesis.speak(utterance);
    }

    els.nextBtn.addEventListener("click", nextWord);
    els.parentBtn.addEventListener("click", () => {
      window.location.href = "parent-check.html";
    });
    els.speakBtn.addEventListener("click", () => speak(levels[game.levelIndex].words[game.wordIndex][0]));
    els.retryBtn.addEventListener("click", () => startLevel(game.levelIndex));
    els.continueBtn.addEventListener("click", () => startLevel(Math.min(game.levelIndex + 1, levels.length - 1)));
    els.soundToggle.addEventListener("click", () => {
      state.sound = !state.sound;
      els.soundToggle.style.opacity = state.sound ? "1" : ".45";
      saveState();
    });
    els.resetBtn.addEventListener("click", () => {
      if (!confirm("确定要清空闯关进度吗？")) return;
      localStorage.removeItem(storageKey);
      Object.assign(state, loadState());
      startLevel(0);
    });

    els.soundToggle.style.opacity = state.sound ? "1" : ".45";
    startLevel(Math.min(game.levelIndex, state.unlocked - 1));
  </script>
</body>
