<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>初中化学实验闯关</title>
  <style>
    :root {
      --ink: #142033;
      --muted: #667085;
      --line: #d8e0ea;
      --blue: #2563eb;
      --green: #0f9f6e;
      --red: #dc3d43;
      --violet: #6d5bd0;
      --cyan: #0787a8;
      --paper: #f7fafc;
      --shadow: 0 14px 38px rgba(20, 32, 48, .12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 16%, rgba(37, 99, 235, .12), transparent 26%),
        radial-gradient(circle at 86% 13%, rgba(15, 159, 110, .13), transparent 24%),
        linear-gradient(135deg, #eef7ff 0%, #f8fbf4 55%, #fff6f0 100%);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button { cursor: pointer; font: inherit; }
    .app { width: min(1180px, calc(100% - 32px)); min-height: 100vh; margin: 0 auto; padding: 24px 0; display: grid; grid-template-rows: auto 1fr auto; gap: 18px; }
    .topbar, .brand, .top-actions, .controls, .meta { display: flex; align-items: center; gap: 12px; }
    .topbar { justify-content: space-between; }
    .brand { min-width: 0; }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 24px; line-height: 1.2; }
    .subtitle { margin-top: 4px; color: var(--muted); font-size: 14px; }
    .logo, .icon-btn { border-radius: 8px; display: grid; place-items: center; color: #fff; }
    .logo { width: 46px; height: 46px; background: var(--ink); box-shadow: var(--shadow); flex: 0 0 auto; }
    .logo svg, .icon-btn svg { width: 24px; height: 24px; }
    .icon-btn { width: 42px; height: 42px; border: 1px solid var(--line); background: rgba(255,255,255,.86); color: var(--ink); transition: .16s ease; }

    main { display: grid; grid-template-columns: 260px minmax(0, 1fr); gap: 18px; min-height: 0; }
    .sidebar, .stage, .result { border: 1px solid rgba(216,224,234,.88); border-radius: 8px; background: rgba(255,255,255,.86); box-shadow: var(--shadow); backdrop-filter: blur(8px); }
    .sidebar { padding: 16px; display: grid; gap: 16px; align-self: start; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat { min-height: 72px; border: 1px solid var(--line); border-radius: 8px; padding: 10px; background: #fff; }
    .stat b { display: block; font-size: 22px; line-height: 1.15; }
    .stat span, .muted { color: var(--muted); font-size: 12px; }
    .level-list { display: grid; gap: 8px; }
    .level-btn { min-height: 42px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--ink); display: flex; align-items: center; justify-content: space-between; gap: 10px; transition: .16s ease; }
    .level-btn.active { color: var(--blue); border-color: var(--blue); box-shadow: inset 3px 0 0 var(--blue); }
    .level-btn:disabled { cursor: not-allowed; color: #98a2b3; background: #f2f4f7; transform: none; box-shadow: none; }
    .badge { min-width: 34px; text-align: center; border-radius: 999px; padding: 3px 8px; color: #fff; background: var(--green); font-size: 12px; }
    .badge.lock { background: #98a2b3; }
    .stage { min-height: 640px; display: grid; grid-template-rows: auto minmax(0, 1fr); overflow: hidden; }
    .hero { min-height: 210px; padding: 24px; display: grid; grid-template-columns: minmax(0, 1fr) 280px; align-items: center; gap: 18px; color: #fff; background: linear-gradient(120deg, rgba(20,32,51,.96), rgba(109,91,208,.82)), #142033; }
    .hero h2 { font-size: 36px; line-height: 1.12; max-width: 680px; }
    .hero p { margin-top: 12px; max-width: 650px; color: rgba(255,255,255,.78); line-height: 1.7; }
    .scene { width: 100%; max-width: 280px; justify-self: end; }
    .scene svg { display: block; width: 100%; height: auto; }
    .game { padding: 20px; display: grid; grid-template-rows: auto auto minmax(0, 1fr) auto auto; gap: 16px; }
    .meter-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: center; gap: 14px; }
    .progress { height: 12px; border-radius: 999px; background: #e7edf4; overflow: hidden; }
    .progress span { display: block; width: 0; height: 100%; background: linear-gradient(90deg, var(--green), var(--blue)); transition: width .25s ease; }
    .counter { color: var(--muted); font-weight: 800; white-space: nowrap; }
    .question-card { border: 1px solid var(--line); border-radius: 8px; background: var(--paper); padding: 18px; display: grid; gap: 12px; }
    .meta { flex-wrap: wrap; color: var(--muted); font-size: 13px; }
    .pill { border: 1px solid var(--line); border-radius: 999px; padding: 5px 9px; background: #fff; }
    .mission { color: var(--violet); font-weight: 800; }
    .question { font-size: 28px; line-height: 1.38; font-weight: 800; overflow-wrap: anywhere; }
    .choices { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; align-content: start; }
    .choice { min-height: 86px; border: 2px solid var(--line); border-radius: 8px; padding: 14px 16px; background: #fff; color: var(--ink); display: flex; align-items: center; gap: 12px; text-align: left; transition: .16s ease; line-height: 1.45; }
    .letter { width: 30px; height: 30px; border-radius: 8px; background: #eef2f7; color: var(--muted); display: grid; place-items: center; font-weight: 800; flex: 0 0 auto; }
    .icon-btn:hover, .level-btn:hover, .choice:hover, .primary:hover, .secondary:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(20,32,48,.14); }
    .choice.correct { border-color: var(--green); background: #eaf8f2; }
    .choice.wrong { border-color: var(--red); background: #fff0f0; }
    .choice:disabled { cursor: default; }
    .explain { min-height: 92px; border-left: 4px solid var(--cyan); padding: 12px 14px; border-radius: 8px; background: #f0fbfe; line-height: 1.65; }
    .explain strong { color: var(--cyan); }
    .controls { justify-content: space-between; flex-wrap: wrap; }
    .primary, .secondary { min-height: 44px; border-radius: 8px; padding: 10px 16px; border: 1px solid transparent; font-weight: 800; transition: .16s ease; }
    .primary { color: #fff; background: var(--blue); }
    .primary:disabled { cursor: not-allowed; background: #98a2b3; transform: none; box-shadow: none; }
    .secondary { color: var(--ink); background: #fff; border-color: var(--line); }
    .result { display: none; padding: 22px; gap: 18px; align-content: start; }
    .result.show { display: grid; }
    .result h2 { font-size: 30px; }
    .review-list { display: grid; gap: 8px; }
    .review-item { border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 10px 12px; line-height: 1.55; }
    footer { color: var(--muted); font-size: 12px; text-align: center; padding-bottom: 4px; }
    .hidden { display: none !important; }
    @media (max-width: 860px) {
      .app { width: min(100% - 20px, 680px); padding: 12px 0; }
      .topbar, main, .hero { grid-template-columns: 1fr; }
      .topbar { align-items: start; }
      main { display: flex; flex-direction: column; }
      .sidebar { order: 2; }
      .stage { min-height: 0; }
      .hero { min-height: 260px; }
      .hero h2 { font-size: 30px; }
      .scene { max-width: 210px; justify-self: center; }
      .question { font-size: 23px; }
      .choices { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M9 3v5l-5 9a3 3 0 0 0 2.6 4.5h10.8A3 3 0 0 0 20 17L15 8V3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 13h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>初中化学实验闯关</h1>
          <p class="subtitle">从厨房、空气、水和实验安全开始，像做实验一样学习</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="parentBtn" title="家长检查" aria-label="家长检查">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 19V5M4 19h16M8 15v-4M12 15V8M16 15v-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn" id="resetBtn" title="重置进度" aria-label="重置进度">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 7v5h5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.8 17A7.5 7.5 0 1 0 5 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>

    <main>
      <aside class="sidebar">
        <section class="stat-grid">
          <div class="stat"><b id="totalCorrect">0</b><span>累计答对</span></div>
          <div class="stat"><b id="bestStreak">0</b><span>最高连胜</span></div>
          <div class="stat"><b id="mistakeCount">0</b><span>错题数</span></div>
          <div class="stat"><b id="stars">0</b><span>星星</span></div>
        </section>
        <section>
          <h3>实验关卡</h3>
          <div class="level-list" id="levelList"></div>
        </section>
      </aside>

      <section class="stage">
        <div class="hero">
          <div>
            <h2>先看现象，再问“物质变了吗？”</h2>
            <p>化学不是一上来背方程式。先从变化、空气、水、溶液和安全开始，练会观察和判断。</p>
          </div>
          <div class="scene" aria-hidden="true">
            <svg viewBox="0 0 320 220">
              <path d="M102 44v54l-42 72a15 15 0 0 0 13 22h78a15 15 0 0 0 13-22l-42-72V44" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.52)" stroke-width="5" stroke-linejoin="round"/>
              <path d="M78 154h68" stroke="#34d399" stroke-width="10" stroke-linecap="round"/>
              <circle cx="96" cy="138" r="8" fill="#bfdbfe"/>
              <circle cx="132" cy="126" r="6" fill="#fbbf24"/>
              <path d="M194 82h58M194 118h58M194 154h58" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
              <path d="M206 67v102" stroke="#111827" stroke-width="10" stroke-linecap="round"/>
              <path d="M240 67v102" stroke="#111827" stroke-width="10" stroke-linecap="round"/>
            </svg>
          </div>
        </div>

        <div class="game" id="game">
          <div class="meter-row">
            <div class="progress"><span id="progressBar"></span></div>
            <div class="counter" id="counter">1 / 10</div>
          </div>
          <div class="question-card">
            <div class="meta">
              <span class="pill" id="levelName">第 1 关</span>
              <span class="pill" id="streak">连胜 0</span>
              <span class="pill" id="score">本关 0 分</span>
            </div>
            <p class="mission" id="mission">实验判断</p>
            <div class="question" id="questionText"></div>
          </div>
          <div class="choices" id="choices"></div>
          <div class="explain" id="explain"><strong>先观察：</strong>选出你认为最合理的判断。</div>
          <div class="controls">
            <button class="secondary" id="tipBtn">提示</button>
            <button class="primary" id="nextBtn" disabled>下一题</button>
          </div>
        </div>

        <div class="result" id="result">
          <h2 id="resultTitle">闯关完成</h2>
          <p id="resultText"></p>
          <div class="review-list" id="reviewList"></div>
          <div class="controls">
            <button class="secondary" id="retryBtn">重练本关</button>
            <button class="primary" id="continueBtn">进入下一关</button>
          </div>
        </div>
      </section>
    </main>
    <footer>安全提醒：页面里的“小实验感”用于理解，真实实验要有老师或家长指导。</footer>
  </div>

  <script>
    const storageKey = "junior-chemistry-quest-progress-v1";
    const levels = [
      { name: "物质变化", tip: "判断是否生成新物质，是区分物理变化和化学变化的关键。", items: [
        ["冰块融化成水，属于什么变化？", "物理变化", ["化学变化", "爆炸变化", "发光变化"], "只是状态改变，没有生成新物质。"],
        ["铁钉生锈，属于什么变化？", "化学变化", ["物理变化", "形状变化", "溶解变化"], "铁锈是新物质，所以是化学变化。"],
        ["纸被撕碎，主要属于？", "物理变化", ["化学变化", "燃烧变化", "氧化变化"], "形状改变，没有生成新物质。"],
        ["蜡烛燃烧时，最关键的判断是？", "生成了新物质", ["蜡烛变短", "火焰很亮", "温度升高"], "燃烧生成二氧化碳、水等新物质。"],
        ["食盐溶解在水中，通常属于？", "物理变化", ["化学变化", "腐蚀", "燃烧"], "食盐和水没有变成新物质，可通过蒸发分离。"]
      ]},
      { name: "空气与氧气", tip: "氧气支持燃烧，但氧气本身不是可燃物。", items: [
        ["空气中含量最多的气体是？", "氮气", ["氧气", "二氧化碳", "水蒸气"], "空气中氮气约占 78%，氧气约占 21%。"],
        ["氧气的一个重要性质是？", "支持燃烧", ["自己一定燃烧", "使所有物体变轻", "没有质量"], "氧气能帮助燃烧，但不是所有情况下自己燃烧。"],
        ["检验氧气常用什么现象？", "带火星木条复燃", ["石灰水变浑浊", "闻到香味", "颜色变红"], "氧气能使带火星的木条复燃。"],
        ["人呼出的气体中，哪种气体比吸入空气中更多？", "二氧化碳", ["氮气消失", "氧气更多", "氢气更多"], "呼吸消耗氧气，产生较多二氧化碳。"],
        ["燃烧通常需要可燃物、氧气和什么？", "达到着火点", ["变成液体", "被水浸泡", "放进冰箱"], "灭火常从隔绝氧气、移走可燃物、降温入手。"]
      ]},
      { name: "水与溶液", tip: "溶液要均一、稳定，溶质被溶剂分散。", items: [
        ["糖水中，糖通常叫作？", "溶质", ["溶剂", "沉淀", "杂质"], "被溶解的物质叫溶质。"],
        ["糖水中，水通常叫作？", "溶剂", ["溶质", "气体", "金属"], "能溶解其他物质的物质叫溶剂。"],
        ["一杯澄清盐水放一会儿不分层，说明它？", "比较稳定", ["一定有毒", "一定是纯净物", "没有质量"], "溶液具有均一、稳定的特点。"],
        ["加热通常能怎样影响很多固体的溶解速度？", "加快溶解", ["一定停止溶解", "让水消失", "让盐变成铁"], "升温、搅拌、研碎常能加快溶解。"],
        ["过滤能分离的是？", "不溶性固体和液体", ["盐水中的盐和水", "空气中的氧气", "糖水中的糖"], "过滤适合分离液体中的不溶性固体。"]
      ]},
      { name: "元素和符号", tip: "元素符号第一个字母大写，第二个字母小写。", items: [
        ["氧元素的符号是？", "O", ["Au", "C", "Fe"], "O 表示氧元素。"],
        ["氢元素的符号是？", "H", ["He", "Hg", "Na"], "H 表示氢元素，He 是氦。"],
        ["碳元素的符号是？", "C", ["Ca", "Cu", "Cl"], "C 表示碳元素，其他都是不同元素。"],
        ["钠元素的符号是？", "Na", ["N", "S", "Ne"], "Na 来自钠的拉丁文名称。"],
        ["书写元素符号时，第二个字母应该？", "小写", ["大写", "随便写", "写成数字"], "如 Ca、Fe、Na，第二个字母要小写。"]
      ]},
      { name: "实验安全", tip: "初中化学先学会安全和规范，不能随便闻、尝、混合药品。", items: [
        ["闻未知气体时，正确做法是？", "用手轻轻扇闻", ["把鼻子凑近猛闻", "直接用嘴尝", "点燃后再闻"], "实验室不能直接猛闻气体。"],
        ["加热试管时，试管口应该？", "不朝向人", ["正对自己", "正对同学", "用手堵住"], "防止液体喷出伤人。"],
        ["实验剩余药品通常应该？", "按老师要求处理", ["倒回原瓶", "随便带走", "直接入口尝"], "剩余药品不能随意处理，更不能倒回原瓶污染试剂。"],
        ["酒精灯着火面积小，通常可用什么盖灭？", "湿抹布", ["用嘴吹", "用纸扇", "倒酒精"], "隔绝空气可以灭火。"],
        ["实验中不小心弄到皮肤，第一步通常是？", "用大量清水冲洗并报告老师", ["继续实验", "用纸擦一下就行", "藏起来"], "安全问题要及时处理和报告。"]
      ]},
      { name: "生活中的化学", tip: "化学研究物质的组成、性质和变化，生活里到处都有化学。", items: [
        ["切开的苹果变色，常和什么有关？", "氧化", ["结冰", "磁化", "蒸发"], "苹果中的物质接触氧气后会发生变化。"],
        ["干燥剂常用于食品包装，主要作用是？", "吸收水分", ["增加甜味", "产生氧气", "改变颜色"], "干燥剂能降低包装内湿度。"],
        ["用洗洁精去油污，主要利用了它的什么作用？", "乳化", ["燃烧", "结晶", "磁化"], "洗洁精能让油分散到水中，更容易冲走。"],
        ["天然气燃烧做饭，主要发生了？", "化学变化", ["只发生物理变化", "没有变化", "只改变形状"], "燃烧会生成新物质并释放能量。"],
        ["保存铁制品时保持干燥，主要为了减少？", "生锈", ["熔化", "发光", "溶解成糖"], "铁生锈与水和氧气有关。"]
      ]}
    ];
    const state = loadState();
    const game = { levelIndex: state.currentLevel || 0, questionIndex: 0, questions: [], score: 0, streak: 0, selected: false, roundMistakes: [] };
    const els = {
      levelList: document.querySelector("#levelList"), totalCorrect: document.querySelector("#totalCorrect"), bestStreak: document.querySelector("#bestStreak"),
      mistakeCount: document.querySelector("#mistakeCount"), stars: document.querySelector("#stars"), progressBar: document.querySelector("#progressBar"),
      counter: document.querySelector("#counter"), levelName: document.querySelector("#levelName"), streak: document.querySelector("#streak"), score: document.querySelector("#score"),
      mission: document.querySelector("#mission"), questionText: document.querySelector("#questionText"), choices: document.querySelector("#choices"), explain: document.querySelector("#explain"),
      tipBtn: document.querySelector("#tipBtn"), nextBtn: document.querySelector("#nextBtn"), game: document.querySelector("#game"), result: document.querySelector("#result"),
      resultTitle: document.querySelector("#resultTitle"), resultText: document.querySelector("#resultText"), reviewList: document.querySelector("#reviewList"),
      retryBtn: document.querySelector("#retryBtn"), continueBtn: document.querySelector("#continueBtn"), resetBtn: document.querySelector("#resetBtn"), parentBtn: document.querySelector("#parentBtn")
    };
    function baseState() { return { unlocked: 1, completed: {}, mistakes: {}, history: [], bestStreak: 0, currentLevel: 0 }; }
    function loadState() { try { return JSON.parse(localStorage.getItem(storageKey)) || baseState(); } catch { return baseState(); } }
    function saveState() { state.currentLevel = game.levelIndex; localStorage.setItem(storageKey, JSON.stringify(state)); }
    function shuffle(items) { return [...items].sort(() => Math.random() - .5); }
    function todayKey() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`; }
    function makeQuestions(index) {
      const base = levels[index].items.map(item => ({ text: item[0], answer: item[1], wrong: item[2], explain: item[3], tip: levels[index].tip }));
      return shuffle([...base, ...base]).slice(0, 10);
    }
    function renderLevels() {
      els.levelList.innerHTML = "";
      levels.forEach((level, index) => {
        const button = document.createElement("button");
        button.className = "level-btn" + (index === game.levelIndex ? " active" : "");
        button.disabled = index >= state.unlocked;
        const stars = state.completed[index]?.stars || 0;
        button.innerHTML = `<span>第 ${index + 1} 关 ${level.name}</span><span class="badge ${button.disabled ? "lock" : ""}">${button.disabled ? "锁" : "★".repeat(stars) || "开"}</span>`;
        button.addEventListener("click", () => startLevel(index));
        els.levelList.appendChild(button);
      });
    }
    function renderStats() {
      els.totalCorrect.textContent = Object.values(state.completed).reduce((sum, item) => sum + item.correct, 0);
      els.bestStreak.textContent = state.bestStreak || 0;
      els.mistakeCount.textContent = Object.keys(state.mistakes || {}).length;
      els.stars.textContent = Object.values(state.completed).reduce((sum, item) => sum + item.stars, 0);
    }
    function startLevel(index) {
      game.levelIndex = index; game.questionIndex = 0; game.questions = makeQuestions(index); game.score = 0; game.streak = 0; game.selected = false; game.roundMistakes = [];
      els.result.classList.remove("show"); els.game.classList.remove("hidden"); renderLevels(); renderStats(); renderQuestion(); saveState();
    }
    function renderQuestion() {
      const level = levels[game.levelIndex]; const q = game.questions[game.questionIndex]; game.selected = false;
      els.levelName.textContent = `第 ${game.levelIndex + 1} 关：${level.name}`; els.streak.textContent = `连胜 ${game.streak}`; els.score.textContent = `本关 ${game.score} 分`;
      els.counter.textContent = `${game.questionIndex + 1} / ${game.questions.length}`; els.progressBar.style.width = `${(game.questionIndex / game.questions.length) * 100}%`;
      els.mission.textContent = "实验判断"; els.questionText.textContent = q.text; els.explain.innerHTML = "<strong>先观察：</strong>选出你认为最合理的判断。"; els.nextBtn.disabled = true;
      els.choices.innerHTML = "";
      shuffle([q.answer, ...q.wrong]).forEach((choice, index) => {
        const button = document.createElement("button");
        button.className = "choice"; button.innerHTML = `<span class="letter">${String.fromCharCode(65 + index)}</span><span>${choice}</span>`;
        button.addEventListener("click", () => choose(button, choice, q)); els.choices.appendChild(button);
      });
    }
    function choose(button, choice, q) {
      if (game.selected) return; game.selected = true; const ok = choice === q.answer;
      [...els.choices.children].forEach(child => { child.disabled = true; if (child.textContent.includes(q.answer)) child.classList.add("correct"); });
      if (ok) { game.score += 10; game.streak += 1; state.bestStreak = Math.max(state.bestStreak || 0, game.streak); delete state.mistakes[q.text]; button.classList.add("correct"); els.explain.innerHTML = `<strong>判断正确：</strong>${q.explain}`; }
      else { game.streak = 0; state.mistakes[q.text] = q; game.roundMistakes.push(q); button.classList.add("wrong"); els.explain.innerHTML = `<strong>实验复盘：</strong>${q.explain}`; }
      els.streak.textContent = `连胜 ${game.streak}`; els.score.textContent = `本关 ${game.score} 分`; els.nextBtn.disabled = false; renderStats(); saveState();
    }
    function nextQuestion() { if (game.questionIndex < game.questions.length - 1) { game.questionIndex += 1; renderQuestion(); } else finishLevel(); }
    function recordStudy(correct, stars) {
      state.history ||= [];
      state.history.push({ date: todayKey(), time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" }), subject: "化学", level: game.levelIndex + 1, levelName: levels[game.levelIndex].name, correct, total: game.questions.length, stars, mistakes: game.roundMistakes.map(item => item.text).slice(0, 6) });
      state.history = state.history.slice(-80);
    }
    function finishLevel() {
      const correct = Math.round(game.score / 10); const stars = correct >= 9 ? 3 : correct >= 7 ? 2 : correct >= 5 ? 1 : 0;
      state.completed[game.levelIndex] = { correct, stars }; recordStudy(correct, stars);
      if (correct >= 7 && game.levelIndex + 1 < levels.length) state.unlocked = Math.max(state.unlocked, game.levelIndex + 2);
      els.progressBar.style.width = "100%"; els.game.classList.add("hidden"); els.result.classList.add("show");
      els.resultTitle.textContent = correct >= 7 ? "实验闯关成功" : "本关需要再观察"; els.resultText.textContent = `答对 ${correct}/10，获得 ${stars} 颗星。${correct >= 7 ? "下一关已解锁。" : "答对 7 题以上即可解锁下一关。"}`;
      const items = game.roundMistakes.length ? game.roundMistakes : game.questions.slice(0, 3);
      els.reviewList.innerHTML = items.map(item => `<div class="review-item"><strong>${item.text}</strong><br>答案：${item.answer}<br>${item.explain}</div>`).join("");
      els.continueBtn.disabled = !(correct >= 7 && game.levelIndex + 1 < levels.length); renderLevels(); renderStats(); saveState();
    }
    els.tipBtn.addEventListener("click", () => { els.explain.innerHTML = `<strong>提示：</strong>${levels[game.levelIndex].tip}`; });
    els.nextBtn.addEventListener("click", nextQuestion);
    els.retryBtn.addEventListener("click", () => startLevel(game.levelIndex));
    els.continueBtn.addEventListener("click", () => startLevel(Math.min(game.levelIndex + 1, levels.length - 1)));
    els.parentBtn.addEventListener("click", () => { window.location.href = "parent-check.html"; });
    els.resetBtn.addEventListener("click", () => { if (!confirm("确定要清空化学闯关进度吗？")) return; localStorage.removeItem(storageKey); Object.assign(state, baseState()); startLevel(0); });
    startLevel(Math.min(game.levelIndex, state.unlocked - 1));
  </script>
</body>
